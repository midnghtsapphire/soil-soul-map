<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RegenFood - Find Local Regenerative Farms, Markets & Restaurants</title>
    <meta name="description" content="Discover farms, farmers' markets, and restaurants practicing regenerative agriculture near you. Support soil health, biodiversity, and your local community." />
    <meta name="keywords" content="regenerative agriculture, local farms, farmers markets, farm to table restaurants, sustainable food, organic farming, soil health" />
    <link rel="canonical" href="https://regenfood.app" />
    
    <!-- Open Graph / Social -->
    <meta property="og:title" content="RegenFood - Find Local Regenerative Farms & Markets" />
    <meta property="og:description" content="Connect with farms and restaurants practicing regenerative agriculture in your area." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://regenfood.app" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@RegenFood" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "RegenFood",
      "description": "Find local farms, farmers' markets, and restaurants practicing regenerative agriculture",
      "applicationCategory": "Food & Drink",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
